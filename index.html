<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Voice Trainer</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --error: #dc2626; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { text-align: center; color: #1e293b; }
        textarea { width: 100%; height: 100px; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 0.5rem; margin: 1rem 0; box-sizing: border-box; }
        .btn { width: 100%; padding: 0.75rem; border: none; border-radius: 0.5rem; cursor: pointer; font-weight: 600; margin-bottom: 0.5rem; transition: opacity 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-mic { background: #4f46e5; color: white; font-size: 1.1rem; }
        .btn-hear { background: #94a3b8; color: white; }
        .hidden { display: none; }
        .word-box { font-size: 2.5rem; font-weight: 800; text-align: center; margin: 1.5rem 0; color: #1e293b; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; background: #f1f5f9; padding: 10px; border-radius: 0.5rem; font-size: 0.9rem; }
        .result-box { text-align: center; min-height: 3rem; font-weight: 700; margin: 1rem 0; padding: 1rem; border-radius: 0.5rem; }
        .msg-success { background: #dcfce7; color: var(--success); }
        .msg-error { background: #fee2e2; color: var(--error); }
    </style>
</head>
<body>

<div class="card" id="setup">
    <h2>Treino de Inglês</h2>
    <p>Insira termos ou frases (um por linha):</p>
    <textarea id="inputList" placeholder="casa&#10;como posso ajuda-lo"></textarea>
    <button class="btn btn-blue" onclick="startApp()">Começar Treinar</button>
</div>

<div class="card hidden" id="app">
    <div class="stats-grid">
        <div>Progresso: <span id="stat-pos">0</span>/<span id="stat-total">0</span></div>
        <div>Acertos: <span id="stat-ok">0</span></div>
    </div>
    
    <div class="word-box" id="display-word">---</div>
    
    <button class="btn btn-mic" id="btn-listen">🎤 Clicar e Falar</button>
    <button class="btn btn-hear" onclick="playAudio()">🔊 Ouvir Pronúncia</button>
    
    <div id="result" class="result-box hidden"></div>
    
    <button class="btn btn-blue hidden" id="btn-next" onclick="nextWord()">Próxima Palavra</button>
</div>

<script src="script.js"></script>
</body>
</html>
